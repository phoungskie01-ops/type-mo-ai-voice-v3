<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f12] flex items-center justify-center min-h-screen p-6 text-white">

<div class="bg-[#1c1c24] p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-white/5">
    <h1 class="text-3xl font-black text-center mb-1 tracking-tight bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">AI Voice Generator</h1>
    <p class="text-gray-500 text-center text-xs mb-8 uppercase tracking-widest font-bold">Libre at hindi boses robot! 🎭</p>

    <div class="space-y-5">
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Iyong Caption</label>
            <textarea id="textInput" rows="5" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition resize-none" placeholder='Lola: "Apo, may ikinakasal!"'></textarea>
        </div>

        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Piliin ang Boses (Karakter)</label>
            <select id="voiceSelect" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none cursor-pointer appearance-none hover:border-purple-500 transition">
                <option value="en_male_narration">Lolo (Deep/Matanda)</option>
                <option value="en_female_grandma">Lola (Matanda)</option>
                <option value="en_male_funny">Batang Lalake (Energetic)</option>
                <option value="en_female_madam">Batang Babae (Cute/Soft)</option>
                <option value="en_us_001">Standard Female (Reels Voice)</option>
            </select>
        </div>

        <button onclick="generateVoice()" id="btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-black shadow-lg transform active:scale-95 transition-all text-sm uppercase tracking-widest mt-2">
            Magsalita na!
        </button>

        <div id="status" class="text-center text-xs font-bold mt-2 hidden"></div>

        <div id="audioContainer" class="mt-6 space-y-3 hidden">
            <audio id="audioPlayer" controls class="w-full h-10"></audio>
            <a id="downloadLink" class="block w-full text-center bg-white/10 hover:bg-white/20 py-3 rounded-xl text-xs font-bold transition">I-download ang Audio 📥</a>
        </div>
    </div>

    <div class="mt-12 pt-6 border-t border-white/5 text-center">
        <p class="text-[9px] text-gray-700 tracking-[5px] uppercase font-black">Powered by Gemini AI</p>
    </div>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioContainer = document.getElementById('audioContainer');
        const downloadLink = document.getElementById('downloadLink');

        if (!text) {
            alert("Hoy! Mag-type ka muna ng text.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Generating...";
        status.innerText = "Hinahanda ang boses...";
        status.className = "text-center text-xs font-bold mt-2 text-yellow-500 uppercase tracking-widest";
        status.classList.remove('hidden');

        try {
            // Gumagamit ng backup na TikTok API para mas sigurado
            const response = await fetch('https://tiktok-tts.weilbyte.dev/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text.substring(0, 300), voice: voice }) // Limited to 300 chars para hindi mag-error
            });

            const data = await response.json();

            if (data.data) {
                const audioBase64 = `data:audio/mp3;base64,${data.data}`;
                audioPlayer.src = audioBase64;
                audioContainer.classList.remove('hidden');
                audioPlayer.play();
                
                downloadLink.href = audioBase64;
                downloadLink.download = `AI_Voice_${voice}.mp3`;
                
                status.innerText = "Heto na!";
                status.className = "text-center text-xs font-bold mt-2 text-green-500 uppercase tracking-widest";
            } else {
                throw new Error();
            }
        } catch (err) {
            status.innerText = "Error: Masyadong mahaba o busy ang server. Ikli-an mo lang.";
            status.className = "text-center text-xs font-bold mt-2 text-red-500 uppercase tracking-widest";
        } finally {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
        }
    }
</script>

</body>
</html>
