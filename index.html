<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Voice - Rodolfo</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #4caf50; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 120px; margin: 10px 0; border-radius: 10px; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; box-sizing: border-box; font-size: 16px; }
        select { width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; background: #2a2a2a; color: white; border: 1px solid #444; font-size: 14px; }
        button { background: #4caf50; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
        label { display: block; text-align: left; font-size: 12px; color: #888; margin-top: 10px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ultimate AI Voice 🎙️</h2>
        <label>1. Piliin ang Boses:</label>
        <select id="voiceSelect"></select>
        <label>2. Piliin ang Tono (Age/Character):</label>
        <select id="toneSelect">
            <option value="normal">Normal Tagalog</option>
            <option value="matanda">Matanda (Deep/Slow)</option>
            <option value="bata">Bata (High/Fast)</option>
            <option value="halimaw">Halimaw (Deep Monster)</option>
            <option value="robot">Robot (Monotone)</option>
        </select>
        <textarea id="textInput" placeholder="I-type dito, Rodolfo..."></textarea>
        <button onclick="speak()">Magsalita na! 🔊</button>
    </div>
    <script>
        const voiceSelect = document.getElementById('voiceSelect');
        const toneSelect = document.getElementById('toneSelect');
        let voices = [];
        function load() {
            voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;
            voiceSelect.innerHTML = '';
            voices.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.textContent = `${v.name} (${v.lang})`;
                opt.value = i;
                if(v.lang.includes('fil') || v.lang.includes('PH')) opt.selected = true;
                voiceSelect.appendChild(opt);
            });
        }
        window.speechSynthesis.onvoiceschanged = load;
        setTimeout(load, 500);
        function speak() {
            const txt = document.getElementById('textInput').value;
            if (!txt) return alert("Mag-type muna!");
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(txt);
            s.voice = voices[voiceSelect.value];
            const t = toneSelect.value;
            if(t==="matanda") { s.pitch=0.6; s.rate=0.75; }
            else if(t==="bata") { s.pitch=1.7; s.rate=1.2; }
            else if(t==="halimaw") { s.pitch=0.1; s.rate=0.7; }
            else if(t==="robot") { s.pitch=1.0; s.rate=2.0; }
            else { s.pitch=1.0; s.rate=0.9; }
            window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
