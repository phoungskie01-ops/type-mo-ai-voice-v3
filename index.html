<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Voice AI - Rodolfo</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 20px; border: 2px solid #4caf50; }
        textarea { width: 100%; height: 150px; margin: 15px 0; border-radius: 10px; padding: 15px; background: #2a2a2a; color: white; border: 1px solid #444; font-size: 16px; box-sizing: border-box; resize: none; }
        select { width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; background: #2a2a2a; color: white; border: 1px solid #444; }
        button { background: #4caf50; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; }
        .tips { font-size: 11px; color: #888; text-align: left; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#4caf50">Double Voice AI 🎙️🎙️</h2>
        
        <label style="display:block; text-align:left; font-size:12px; margin-bottom:5px;">Pumili ng Boses (Filipino):</label>
        <select id="voiceSelect"></select>
        
        <textarea id="textInput" placeholder="I-type dito ang usapan..."></textarea>
        
        <button onclick="speakAll()">Magsalita na! 🔊</button>

        <div class="tips">
            <b>PAANO GAMITIN:</b><br>
            • Isulat ang <b>Lola:</b> para maging boses matanda.<br>
            • Isulat ang <b>Apo:</b> para maging boses bata.<br>
            • (Kailangan may colon <b>:</b> pagkatapos ng pangalan)
        </div>
    </div>

    <script>
        const voiceSelect = document.getElementById('voiceSelect');
        let voices = [];

        function load() {
            voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            voices.forEach((v, i) => {
                const opt = document.createElement('option');
                opt.textContent = v.name; opt.value = i;
                if(v.lang.includes('fil') || v.lang.includes('PH')) opt.selected = true;
                voiceSelect.appendChild(opt);
            });
        }
        window.speechSynthesis.onvoiceschanged = load; load();

        function speakLine(text, type) {
            const s = new SpeechSynthesisUtterance(text);
            s.voice = voices[voiceSelect.value];
            s.lang = 'fil-PH';

            if (type === 'matanda') {
                s.pitch = 0.6; // Baritono/Matanda
                s.rate = 0.75; // Mabagal
            } else if (type === 'bata') {
                s.pitch = 1.7; // Tining/Bata
                s.rate = 1.15; // Mabilis
            } else {
                s.pitch = 0.95; // Normal
                s.rate = 0.85; 
            }
            window.speechSynthesis.speak(s);
        }

        function speakAll() {
            window.speechSynthesis.cancel();
            const rawText = document.getElementById('textInput').value;
            const lines = rawText.split('\n');
            
            lines.forEach(line => {
                if (line.trim() === "") return;
                
                if (line.toLowerCase().includes('lola:')) {
                    const clean = line.split(/lola:/i)[1];
                    speakLine(clean.trim(), 'matanda');
                } else if (line.toLowerCase().includes('apo:')) {
                    const clean = line.split(/apo:/i)[1];
                    speakLine(clean.trim(), 'bata');
                } else {
                    speakLine(line.trim(), 'normal');
                }
            });
        }
    </script>
</body>
</html>
