<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        .container { max-width: 500px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 150px; margin: 20px 0; border-radius: 10px; padding: 10px; background: #3d3d3d; color: white; border: 1px solid #555; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Voice Generator</h1>
        <textarea id="textInput" placeholder="I-type ang script mo dito..."></textarea>
        <button onclick="speak()">Magsalita na! 🔊</button>
    </div>
    <script>
        function speak() {
            const text = document.getElementById('textInput').value;
            if (!text) { alert("Mag-type ka muna!"); return; }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fil-PH'; 
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
