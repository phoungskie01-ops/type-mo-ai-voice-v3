<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Honor Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f12] flex items-center justify-center min-h-screen p-6 text-white font-sans">

<div class="bg-[#1c1c24] p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-white/5 text-center">
    <h1 class="text-3xl font-black mb-1 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent uppercase text-center">AI VOICE PRO</h1>
    <p class="text-blue-400 text-[10px] mb-8 uppercase tracking-widest font-bold font-mono text-center">● HONOR 200 READY MODE</p>

    <div class="space-y-5 text-left">
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase mb-2">Iyong Caption</label>
            <textarea id="textInput" rows="3" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Type ka dito..."></textarea>
        </div>

        <button onclick="magsalita()" id="btn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all text-sm uppercase">
            Magsalita na!
        </button>

        <audio id="audioPlayer" class="hidden"></audio>
    </div>
</div>

<script>
    function magsalita() {
        const text = document.getElementById('textInput').value;
        const audio = document.getElementById('audioPlayer');
        const btn = document.getElementById('btn');

        if (!text) return alert("Mag-type ka muna!");

        btn.disabled = true;
        btn.innerText = "Nagsasalita...";

        // Gagamit tayo ng Google Translate TTS (Compatible sa lahat ng phone)
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=fil&client=tw-ob`;
        
        audio.src = url;
        audio.play().catch(e => {
            alert("I-click mo ulit yung button!");
        });

        audio.onended = () => {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
        };
    }
</script>

</body>
</html>
