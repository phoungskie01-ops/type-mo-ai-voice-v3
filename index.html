<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator (Free)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] flex items-center justify-center min-height-screen p-5 text-white font-sans">

<div class="bg-[#1e1e1e] p-8 rounded-[30px] shadow-2xl w-full max-w-md border border-white/5">
    <h1 class="text-3xl font-extrabold text-center mb-2 tracking-tight">AI Voice Generator</h1>
    <p class="text-gray-400 text-center text-sm mb-8">Libre at hindi boses robot! 🎭</p>

    <div class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Iyong Caption</label>
            <textarea id="textInput" rows="4" class="w-full bg-black/30 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder='Halimbawa: "Apo, may ikinakasal! Susunod ka na!"'></textarea>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Piliin ang Boses (Karakter)</label>
            <select id="voiceSelect" class="w-full bg-black/30 border border-white/10 rounded-xl p-3 text-sm outline-none cursor-pointer">
                <option value="en_male_narration">Matandang Lalake (Deep/Lolo)</option>
                <option value="en_female_grandma">Matandang Babae (Lola)</option>
                <option value="en_male_funny">Batang Lalake (Energetic)</option>
                <option value="en_female_madam">Batang Babae (Soft/Cute)</option>
                <option value="en_us_001">Standard Female (Reels Voice)</option>
            </select>
        </div>

        <button onclick="generateVoice()" id="btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-full font-bold shadow-lg active:scale-95 transition-all mt-4">
            Magsalita na!
        </button>

        <div id="status" class="text-center text-sm font-medium mt-4 hidden"></div>

        <div id="audioContainer" class="mt-6 flex justify-center hidden">
            <audio id="audioPlayer" controls class="w-full h-10"></audio>
        </div>
    </div>

    <div class="mt-10 pt-6 border-t border-white/5 text-center">
        <p class="text-[10px] text-gray-600 tracking-[4px] uppercase font-bold">Powered by Gemini AI</p>
    </div>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioContainer = document.getElementById('audioContainer');

        if (!text) {
            alert("Mag-type ka muna ng text!");
            return;
        }

        // UI Loading State
        btn.disabled = true;
        btn.innerText = "Generating...";
        status.innerText = "Hinahanda ang boses...";
        status.className = "text-center text-sm font-medium mt-4 text-yellow-400";
        status.classList.remove('hidden');

        try {
            // Gagamit tayo ng proxy/unofficial API para sa TikTok voices (Libre ito)
            const response = await fetch('https://tiktok-tts.weilbyte.dev/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, voice: voice })
            });

            const data = await response.json();

            if (data.data) {
                audioPlayer.src = `data:audio/mp3;base64,${data.data}`;
                audioContainer.classList.remove('hidden');
                audioPlayer.play();
                
                status.innerText = "Heto na!";
                status.className = "text-center text-sm font-medium mt-4 text-green-400";
            } else {
                throw new Error("Failed to generate");
            }
        } catch (err) {
            status.innerText = "Pasensya na, may mali. Subukan ulit.";
            status.className = "text-center text-sm font-medium mt-4 text-red-500";
        } finally {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
        }
    }
</script>

</body>
</html>
