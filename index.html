<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Honor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f12] flex items-center justify-center min-h-screen p-6 text-white">

<div class="bg-[#1c1c24] p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-white/5 text-center">
    <h1 class="text-3xl font-black mb-1 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent uppercase">AI VOICE PRO</h1>
    <p class="text-blue-400 text-[10px] mb-8 font-bold font-mono">● HONOR 200 ACTIVE MODE</p>

    <div class="space-y-5 text-left">
        <textarea id="textInput" rows="3" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Type ka dito..."></textarea>
        
        <button onclick="magsalita()" id="btn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all text-sm uppercase">
            Magsalita na!
        </button>

        <audio id="audioPlayer" style="display:none"></audio>
    </div>
</div>

<script>
    function magsalita() {
        const text = document.getElementById('textInput').value;
        const audio = document.getElementById('audioPlayer');
        const btn = document.getElementById('btn');

        if (!text) return alert("Mag-type muna!");

        btn.disabled = true;
        btn.innerText = "Nagsasalita...";

        // Mas compatible na link sa Android Chrome
        const url = "https://translate.google.com/translate_tts?ie=UTF-8&q=" + encodeURIComponent(text) + "&tl=fil&client=tw-ob";
        
        audio.src = url;
        
        // Ito ang secret trick para sa Honor/Android Chrome:
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                // Automatic playback started!
            }).catch(error => {
                // Pag nag-error, manual play natin
                btn.innerText = "I-click ulit para tumunog";
                btn.disabled = false;
            });
        }

        audio.onended = () => {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
        };
    }
</script>

</body>
</html>
