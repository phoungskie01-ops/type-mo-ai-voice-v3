<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f12] flex items-center justify-center min-h-screen p-6 text-white font-sans">

<div class="bg-[#1c1c24] p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/5">
    <h1 class="text-3xl font-black text-center mb-1 tracking-tight bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent uppercase">AI Voice Generator</h1>
    <p class="text-gray-500 text-center text-[10px] mb-8 uppercase tracking-[0.2em] font-bold">Stable Version (Free) 🎭</p>

    <div class="space-y-5">
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">Iyong Caption</label>
            <textarea id="textInput" rows="4" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition resize-none" placeholder='Type mo dito...'></textarea>
        </div>

        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Piliin ang Boses</label>
            <select id="voiceSelect" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none cursor-pointer appearance-none">
                <option value="en_male_narration">Lolo (Deep Voice)</option>
                <option value="en_female_grandma">Lola (Old Woman)</option>
                <option value="en_male_funny">Batang Lalake (Funny)</option>
                <option value="en_female_madam">Batang Babae (Soft)</option>
                <option value="en_us_001">Standard Female</option>
            </select>
        </div>

        <button onclick="generateVoice()" id="btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-black shadow-lg transform active:scale-95 transition-all text-sm uppercase tracking-widest">
            Magsalita na!
        </button>

        <div id="status" class="text-center text-[11px] font-bold mt-2 hidden"></div>

        <div id="audioContainer" class="mt-6 space-y-3 hidden">
            <audio id="audioPlayer" controls class="w-full h-10"></audio>
            <a id="downloadLink" class="block w-full text-center bg-white/10 hover:bg-white/20 py-3 rounded-xl text-[11px] font-bold transition uppercase tracking-widest">Download Audio 📥</a>
        </div>
    </div>

    <div class="mt-12 pt-6 border-t border-white/5 text-center">
        <p class="text-[9px] text-gray-700 tracking-[5px] uppercase font-black italic">Powered by Gemini AI</p>
    </div>
</div>

<script>
    async function generateVoice() {
        const text = document.querySelector('#textInput').value;
        const voice = document.querySelector('#voiceSelect').value;
        const btn = document.querySelector('#btn');
        const status = document.querySelector('#status');
        const audioPlayer = document.querySelector('#audioPlayer');
        const audioContainer = document.querySelector('#audioContainer');

        if (!text) return alert("Mag-type muna!");

        btn.disabled = true;
        btn.innerText = "Processing...";
        status.innerText = "Ginigising ang AI...";
        status.className = "text-center text-[11px] font-bold mt-2 text-yellow-500 uppercase tracking-widest";
        status.classList.remove('hidden');

        try {
            // New Stable Proxy for TikTok TTS
            const response = await fetch('https://tiktok-tts-worker.phoungskie.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, voice: voice })
            });

            const data = await response.json();

            if (data.audio_url || data.data) {
                const b64Data = data.data || data.audio_url;
                const audioSource = b64Data.startsWith('data:') ? b64Data : `data:audio/mp3;base64,${b64Data}`;
                
                audioPlayer.src = audioSource;
                audioContainer.classList.remove('hidden');
                audioPlayer.play();
                
                document.querySelector('#downloadLink').href = audioSource;
                document.querySelector('#downloadLink').download = "voice.mp3";
                
                status.innerText = "Heto na!";
                status.className = "text-center text-[11px] font-bold mt-2 text-green-500 uppercase tracking-widest";
            } else { throw new Error(); }
        } catch (e) {
            status.innerText = "Ayaw pa rin. Subukan ulit (Minsan kailangan ng 2-3 clicks).";
            status.className = "text-center text-[11px] font-bold mt-2 text-red-500 uppercase tracking-widest";
        } finally {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
        }
    }
</script>

</body>
</html>
