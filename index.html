<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f12] flex items-center justify-center min-h-screen p-6 text-white font-sans">

<div class="bg-[#1c1c24] p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/5">
    <h1 class="text-3xl font-black text-center mb-1 tracking-tight bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent uppercase">AI Voice Generator</h1>
    <p class="text-gray-500 text-center text-[10px] mb-8 uppercase tracking-[0.2em] font-bold text-green-400">Direct Native Mode (No Error) 🎭</p>

    <div class="space-y-5">
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest text-left">Iyong Caption</label>
            <textarea id="textInput" rows="4" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition resize-none" placeholder='Halimbawa: "Apo, kain na tayo!"'></textarea>
        </div>

        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest text-left">Piliin ang Boses</label>
            <select id="voiceSelect" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none cursor-pointer appearance-none">
                <option value="lolo">Lolo (Deep/Paos Voice)</option>
                <option value="lola">Lola (Old Woman Voice)</option>
                <option value="batang_lalake">Batang Lalake (Matinis)</option>
                <option value="batang_babae">Batang Babae (Cute)</option>
            </select>
        </div>

        <button onclick="speakNow()" id="btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-black shadow-lg transform active:scale-95 transition-all text-sm uppercase tracking-widest">
            Magsalita na!
        </button>

        <div id="status" class="text-center text-[11px] font-bold mt-2 hidden uppercase tracking-widest"></div>
    </div>

    <div class="mt-12 pt-6 border-t border-white/5 text-center">
        <p class="text-[9px] text-gray-700 tracking-[5px] uppercase font-black italic">Powered by Gemini AI</p>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    function speakNow() {
        const text = document.querySelector('#textInput').value;
        const voiceType = document.querySelector('#voiceSelect').value;
        const btn = document.querySelector('#btn');
        const status = document.querySelector('#status');

        if (!text) return alert("Mag-type muna ng caption!");

        if (synth.speaking) return console.error("Nagsasalita pa...");

        const utter = new SpeechSynthesisUtterance(text);
        
        // Settings para sa Apat na Boses
        if (voiceType === 'lolo') {
            utter.pitch = 0.5; // Mababang-mababa
            utter.rate = 0.8;  // Mabagal
        } else if (voiceType === 'lola') {
            utter.pitch = 0.8; // Mababa pero malambot
            utter.rate = 0.7;  // Mas mabagal
        } else if (voiceType === 'batang_lalake') {
            utter.pitch = 1.6; // Matinis
            utter.rate = 1.1;  // Mabilis
        } else if (voiceType === 'batang_babae') {
            utter.pitch = 1.9; // Pinakamatinis
            utter.rate = 1.0;
        }

        utter.lang = 'fil-PH'; // Susubukan ang Tagalog voice

        utter.onstart = () => {
            btn.disabled = true;
            btn.innerText = "Nagsasalita...";
            status.innerText = "Heto na!";
            status.className = "text-center text-[11px] font-bold mt-2 text-green-500 uppercase tracking-widest";
            status.classList.remove('hidden');
        };

        utter.onend = () => {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
            setTimeout(() => status.classList.add('hidden'), 2000);
        };

        synth.speak(utter);
    }
</script>

</body>
</html>
