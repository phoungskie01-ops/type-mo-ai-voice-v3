<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural AI Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f12] flex items-center justify-center min-h-screen p-6 text-white font-sans">

<div class="bg-[#1c1c24] p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/5 text-center">
    <h1 class="text-3xl font-black mb-1 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent uppercase">Natural Voice AI</h1>
    <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-[0.2em] font-bold">TikTok Style (Hindi Robot) 🎭</p>

    <div class="space-y-5 text-left">
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Iyong Caption</label>
            <textarea id="textInput" rows="3" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition resize-none" placeholder='Halimbawa: "Apo, may ikinakasal! Susunod ka na!"'></textarea>
        </div>

        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Piliin ang Karakter</label>
            <select id="voiceSelect" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm outline-none cursor-pointer appearance-none hover:border-purple-500 transition">
                <option value="en_male_narration">Lolo (Deep/Natural)</option>
                <option value="en_female_grandma">Lola (Old/Soft)</option>
                <option value="en_male_funny">Batang Lalake (Energetic)</option>
                <option value="en_female_madam">Batang Babae (Cute)</option>
                <option value="en_us_001">Standard (Reels Voice)</option>
            </select>
        </div>

        <button onclick="generateVoice()" id="btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-black shadow-lg transform active:scale-95 transition-all text-sm uppercase tracking-widest mt-2">
            Magsalita na!
        </button>

        <div id="status" class="text-center text-[11px] font-bold mt-2 hidden uppercase tracking-widest"></div>

        <div id="audioContainer" class="mt-4 hidden">
            <audio id="audioPlayer" controls class="w-full h-10"></audio>
        </div>
    </div>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioContainer = document.getElementById('audioContainer');

        if (!text) return alert("Hoy! Mag-type ka muna.");

        btn.disabled = true;
        btn.innerText = "Generating...";
        status.innerText = "Hinahanda ang natural na boses...";
        status.className = "text-center text-[11px] font-bold mt-2 text-yellow-500 uppercase tracking-widest";
        status.classList.remove('hidden');

        try {
            // Gagamit ng backup TikTok API server para hindi mag-error
            const response = await fetch('https://tiktok-tts.weilbyte.dev/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, voice: voice })
            });

            const data = await response.json();

            if (data.data) {
                const b64 = `data:audio/mp3;base64,${data.data}`;
                audioPlayer.src = b64;
                audioContainer.classList.remove('hidden');
                audioPlayer.play();
                
                status.innerText = "Heto na!";
                status.className = "text-center text-[11px] font-bold mt-2 text-green-500 uppercase tracking-widest";
            } else {
                throw new Error();
            }
        } catch (err) {
            status.innerText = "Busy ang server. Click mo lang ulit.";
            status.className = "text-center text-[11px] font-bold mt-2 text-red-500 uppercase tracking-widest";
        } finally {
            btn.disabled = false;
            btn.innerText = "Magsalita na!";
        }
    }
</script>

</body>
</html>
